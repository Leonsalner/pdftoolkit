name: Release
on:
  push:
    tags:
      - 'v*'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'macos-latest' # for arm64
            args: '--target aarch64-apple-darwin'
    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install dependencies
        run: |
          npm install
          npm ci

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Install required tools
        run: brew install ghostscript tesseract qpdf

      - name: Setup Sidecars
        run: ./setup_env.sh

      - name: Build and Release Tauri app
        id: tauri_build
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: app-v__VERSION__
          releaseName: 'PDF Toolkit v__VERSION__'
          releaseBody: "## Installation\n**macOS users:** Download the **`.dmg`** file below to install.\n\n*(Note: The `.tar.gz`, `.sig`, and `.json` files are internal artifacts used by the auto-updater and can be safely ignored.)*"
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}

      - name: Update update.json on gh-pages
        run: |
          # Get version from package.json
          VERSION=$(node -p "require('./package.json').version")
          
          # Find the .sig file content
          # Using a broader search as tauri-action pathing can vary
          SIG_FILE=$(find src-tauri/target -name "*.app.tar.gz.sig" | head -n 1)
          if [ -z "$SIG_FILE" ]; then
            echo "Error: .sig file not found"
            exit 1
          fi
          SIGNATURE=$(cat "$SIG_FILE")
          
          # Construct URL based on actual uploaded artifact name format
          URL="https://github.com/Leonsalner/pdftoolkit/releases/download/app-v${VERSION}/PDF.Toolkit_aarch64.app.tar.gz"
          
          # Switch to temporary directory to handle gh-pages
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          mkdir -p ../gh-pages-tmp
          cd ../gh-pages-tmp
          git clone --depth 1 --branch gh-pages https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/Leonsalner/pdftoolkit.git . || (git init && git checkout -b gh-pages)
          
          # Create update.json
          echo "{\"version\":\"$VERSION\",\"notes\":\"Maintenance and feature update.\",\"pub_date\":\"$(date -u +%Y-%m-%dT%H:%M:%SZ)\",\"platforms\":{\"darwin-aarch64\":{\"signature\":\"$SIGNATURE\",\"url\":\"$URL\"}}}" > update.json
          
          git add update.json
          git commit -m "chore: update auto-updater metadata to v$VERSION"
          git push origin gh-pages
